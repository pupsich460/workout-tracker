# Файл main.yml
# Имя workflow
name: Workout Tracker API Workflow

# Когда запускать workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Задачи workflow
jobs:
  tests:
    name: Run tests and code checks
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tracker_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET: test-secret
      GROQ_API_KEY: test-groq-key
      BOT_TOKEN: test-bot-token
      API_URL: http://127.0.0.1:8000
      SQL_ECHO: false
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Check formatting with ruff
        run: ruff format --check app telegram_bot pytest

      - name: Lint with ruff
        run: ruff check app telegram_bot pytest

      - name: Typecheck with mypy
        run: mypy app telegram_bot pytest --ignore-missing-imports

      - name: Run tests with coverage
        run: PYTHONPATH=. python -m pytest --cov=app --cov=telegram_bot --cov-report=term

  build_and_push_to_docker_hub:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: pupsich460/workout-tracker-api:latest

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Copy docker-compose.production.yml to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "docker-compose.production.yml"
          target: "~/workout-tracker"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/workout-tracker
            docker compose -f docker-compose.production.yml pull
            docker compose -f docker-compose.production.yml up -d
            docker compose -f docker-compose.production.yml exec -T backend alembic upgrade head
            docker compose -f docker-compose.production.yml ps