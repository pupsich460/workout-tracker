# Файл main.yml
# Имя workflow
name: Workout Tracker API Workflow

# Когда запускать workflow
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

# Задачи workflow
jobs:
  tests:
    name: Run tests and code checks
    runs-on: ubuntu-latest

    env:
      PYTHONPATH: .
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: tracker_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET: test-secret
      GROQ_API_KEY: test-groq-key
      BOT_TOKEN: test-bot-token
      API_URL: http://127.0.0.1:8000
      SQL_ECHO: false
      REDIS_HOST: localhost
      REDIS_PORT: 6379

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov

      - name: Check formatting with Black
        run: black --check app telegram_bot pytest

      - name: Check imports with isort
        run: isort --check-only app telegram_bot pytest

      - name: Run tests with coverage
        run: PYTHONPATH=. python -m pytest --cov=app --cov-report=term

  docker_build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: workout-tracker-api:latest