services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: pupsich460/workout-tracker-api:latest
    restart: always
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  celery:
    image: pupsich460/workout-tracker-api:latest
    restart: always
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    command: celery -A app.core.celery_app worker --loglevel=info --pool=solo

  celery_beat:
    image: pupsich460/workout-tracker-api:latest
    restart: always
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    command: celery -A app.core.celery_app beat --loglevel=info
  
  flower:
    image: pupsich460/workout-tracker-api:latest
    restart: always
    env_file: .env
    depends_on:
      - redis
      - celery
      - celery_beat
    command: celery -A app.core.celery_app flower --port=5555
    ports:
      - "5555:5555"

  bot:
    image: pupsich460/workout-tracker-api:latest
    restart: always
    env_file: .env
    depends_on:
      backend:
        condition: service_healthy
      db:
        condition: service_started
      redis:
        condition: service_started
    command: python -m telegram_bot.main

volumes:
  postgres_data:
